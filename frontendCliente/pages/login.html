<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Avenidão Container</title>
  <link rel="stylesheet" href="../assets/css/login.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- TOPO -->
    <div class="top-icons">
      <img src="../assets/icons/instagram.png" class="icon">
    </div>

    <!-- LOGO -->
    <div class="logo">
      <img src="../assets/img/logoavenidao.png" alt="Logo">
    </div>

    <!-- FORM -->
    <div class="login-box">
      <h2>Faça o Login</h2>

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="email" placeholder="Seu e-mail">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Senha">
      </div>

      <button class="btn-primary">ENTRAR</button>

      <a href="#" class="link">Esqueci minha senha</a>

      <div class="divider">OU</div>

      <button class="btn-secondary">
        <i class="fa-solid fa-cart-shopping"></i>
        Comprar sem cadastro
      </button>

      <button class="btn-register">CADASTRE-SE</button>
      </div>

      <div class="footer">
      <img src="../assets/icons/home.png" class="home-icon">
  
     </div>

    </div>

  </div>

</body>
</html>
