<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="../assets/css/login.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- ICON -->
    <img src="../assets/icons/instagram.png" class="icon">

    <!-- LOGO -->
    <div class="logo">
      <img src="../assets/img/logoavenidao.png" alt="Logo">
    </div>

    <!-- FORM -->
    <div class="login-box">
      <h2>Crie sua conta</h2>

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Seu nome">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Seu email">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-phone"></i>
        <input type="text" placeholder="(00) 99999-1111">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Senha">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Confirmar Senha">
      </div>

      <p class="terms">
        Ao continuar, você concorda com os
        <span>Termos de Uso</span> e
        <span>Política de Privacidade</span>.
      </p>

      <button class="btn-primary">CADASTRAR</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <img src="../assets/icons/home.png" class="home-icon">
      <span>Início</span>
    </div>

  </div>

</body>
</html>
