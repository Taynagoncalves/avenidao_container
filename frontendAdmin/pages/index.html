<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Pedidos</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="loja-status">
        <button id="btnStatusLoja" class="status-loja ligado" type="button">
          <span class="switch-track">
            <span class="switch-ball"></span>
          </span>
          <span id="textoStatusLoja">LIGADO</span>
        </button>
      </div>

      <div class="logo-area">
        <img src="../assets/img/logoavenidao.png" alt="Logo Avenida Container" />
      </div>

      <nav class="menu">
        <a href="index.html" class="active">
          <img src="../assets/icons/sino.png" alt="">
          <span>Ver Pedidos</span>
        </a>

        <a href="cardapio.html">
          <img src="../assets/icons/cardapio.png" alt="">
          <span>Cardápio</span>
        </a>

        <a href="categorias.html">
          <img src="../assets/icons/categoria.png" alt="">
          <span>Categorias</span>
        </a>

        <a href="adicionais.html">
          <img src="../assets/icons/botao-mais.png" alt="">
          <span>Adicionais</span>
        </a>

        <a href="area-entrega.html">
          <img src="../assets/icons/entrega.png" alt="">
          <span>Área de entrega</span>
        </a>
      </nav>
    </aside>

    <main class="content">
      <section class="cards-resumo">
        <div class="card-resumo">
          <div class="card-header">
            <img src="../assets/icons/pedido.png" alt="">
            <span>Total Pedidos</span>
          </div>
          <div class="card-valor" id="totalPedidos">0</div>
        </div>

        <div class="card-resumo">
          <div class="card-header">
            <img src="../assets/icons/dinheiro.png" alt="">
            <span>Pagos Online hoje</span>
          </div>
          <div class="card-valor" id="totalPagoHoje">R$ 0,00</div>
        </div>

        <div class="card-resumo">
          <div class="card-header">
            <img src="../assets/icons/cliente.png" alt="">
            <span>Total de Clientes</span>
          </div>
          <div class="card-valor" id="totalClientes">0</div>
        </div>
      </section>

      <section class="bloco-pedidos">
        <div class="titulo-bloco">Pedidos Ativos</div>

        <div id="listaPedidos" class="lista-pedidos"></div>

        <div id="semPedidos" class="sem-pedidos">
          Nenhum pedido no momento.
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/js/admin.js"></script>
</body>
</html>
