<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio</title>
  <link rel="stylesheet" href="/admin/assets/css/admin.css">
<link rel="stylesheet" href="/admin/assets/css/cardapio.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="loja-status">
        <button id="btnStatusLoja" class="status-loja ligado" type="button">
          <span class="switch-track">
            <span class="switch-ball"></span>
          </span>
          <span id="textoStatusLoja">LIGADO</span>
        </button>
      </div>

      <div class="logo-area">
        <img src="/admin/assets/img/logoavenidao.png" alt="Logo Avenida Container" />
      </div>

      <nav class="menu">
        <a href="/admin/index">
          <img src="/admin/assets/icons/sino.png" alt="">
          <span>Ver Pedidos</span>
        </a>

        <a href="/admin/cardapio" class="active">
          <img src="/admin/assets/icons/cardapio.png" alt="">
          <span>Cardápio</span>
        </a>

        <a href="/admin/categorias">
          <img src="/admin/assets/icons/categoria.png" alt="">
          <span>Categorias</span>
        </a>

        <a href="/admin/adicionais">
          <img src="/admin/assets/icons/botao-mais.png" alt="">
          <span>Adicionais</span>
        </a>

        <a href="/admin/area-entrega">
          <img src="/admin/assets/icons/entrega.png" alt="">
          <span>Área de entrega</span>
        </a>
      </nav>
    </aside>

    <main class="content">
      <div class="topo-cardapio">
        <div class="titulo-pagina">Cardápio</div>

        <a href="/admin/novo-produto" class="btn-novo-produto">
          Adicionar novo Produto
        </a>
      </div>

      <div id="filtrosCategorias" class="filtros-categorias">
        <!-- categorias vindas do backend -->
      </div>

      <div id="listaProdutos" class="lista-produtos">
        <!-- produtos vindos do backend -->
      </div>

      <div id="semProdutos" class="sem-produtos">
        Nenhum produto encontrado.
      </div>
    </main>
  </div>

  <script src="admin/assets/js/cardapio.js"></script>
</body>
</html>
